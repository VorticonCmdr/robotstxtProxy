services:
  robotstxt-proxy:
    build: .
    image: robotstxt-proxy
    ports:
      - "8080:8080"
    environment:
      # host-only (default) or mitm
      HTTPS_MODE: host-only
      # Optional fixed user-agent to match against robots.txt (default: client's own UA)
      # ROBOTS_UA: Googlebot
      CACHE_TTL_MS: "3600000"
      LOG_LEVEL: info
    # Persist the generated CA across restarts (only needed for HTTPS_MODE=mitm).
    volumes:
      - ./certs:/app/certs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/healthz',r=>{process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
